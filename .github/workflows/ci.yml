name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build contracts dependency
        working-directory: ../portfolio-contracts
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
